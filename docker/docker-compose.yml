version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agi_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agi_user} -d ${POSTGRES_DB:-agi_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agi-network

  redis:
    image: redis/redis-stack:latest
    container_name: agi-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
      - "${REDIS_INSIGHT_PORT:-8003}:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - agi-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agi-backend
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-agi_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agi_db}

      # Redis
      REDIS_URL: redis://redis:6379

      # LangChain/LangSmith
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-agi-production}
      LANGCHAIN_ENDPOINT: https://api.smith.langchain.com

      # LLM Providers
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Embeddings
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}

      # Reranking
      COHERE_API_KEY: ${COHERE_API_KEY}

      # Error Tracking
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${ENVIRONMENT:-production}

      # App Config
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}

    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - backend_cache:/app/.cache
    restart: unless-stopped
    networks:
      - agi-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_cache:
    driver: local

networks:
  agi-network:
    driver: bridge
